<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lasse is toch niet cool...</title>

  <!-- Speelse fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

  <style>
    :root { --accent: #ff2d55; }

    html, body {
      height: 100%;
      margin: 0;
      background: #0b0b10;
      color: white;
      overflow: hidden;
      font-family: "Comic Neue", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      position: relative;
      height: 100%;
      width: 100%;
    }

    .photo-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.08);
      filter: blur(18px) saturate(1.2) brightness(0.7);
      z-index: 0;
    }

    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    /* leesbaarheid */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(0,0,0,0.25), transparent 60%),
        linear-gradient(to top, rgba(0,0,0,0.65), rgba(0,0,0,0.10));
      pointer-events: none;
      z-index: 2;
    }

    .text {
      position: absolute;
      left: 5vw;
      right: 5vw;
      bottom: 6vh;
      line-height: 0.95;
      font-family: "Luckiest Guy", system-ui, sans-serif;
      font-size: clamp(46px, 7vw, 120px);
      letter-spacing: 0.5px;
      text-transform: lowercase;

      /* dikke “sticker” look */
      color: var(--accent);
      -webkit-text-stroke: 6px rgba(0,0,0,0.75);
      text-shadow:
        0 10px 30px rgba(0,0,0,0.55),
        0 2px 0 rgba(0,0,0,0.35);
      z-index: 3;
    }

    /* klikbare full-screen button */
    button#reload {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 4;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <img id="bg" class="photo-bg" alt="" aria-hidden="true">
    <img id="img" class="photo" alt="random foto">
    <div class="overlay"></div>

    <div class="text">lasse is toch niet cool...</div>

    <button id="reload" aria-label="Nieuwe random foto"></button>
  </div>

  <script>
    const IMAGES_DIR = "images";
    const IMAGE_FILES = Array.from({ length: 14 }, (_, i) => `img${i + 1}.jpg`);

    function randomAccent() {
      // Random HSL met lekkere “pop” kleuren
      const h = Math.floor(Math.random() * 360);
      const s = 90;
      const l = 55;
      document.documentElement.style.setProperty("--accent", `hsl(${h} ${s}% ${l}%)`);
    }

    async function loadRandomImage() {
      randomAccent();
      if (!IMAGE_FILES.length) throw new Error("Geen images gevonden in /images");

      const pick = IMAGE_FILES[Math.floor(Math.random() * IMAGE_FILES.length)];
      const img = document.getElementById("img");
      const bg = document.getElementById("bg");
      const src = `${IMAGES_DIR}/${encodeURIComponent(pick)}?v=${Date.now()}`;

      // Force refresh als je vaak dezelfde ziet (cache-buster)
      img.src = src;
      bg.src = src;
    }

    async function boot() {
      try {
        await loadRandomImage();
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById("reload").addEventListener("click", boot);
    boot();
  </script>
</body>
</html>
